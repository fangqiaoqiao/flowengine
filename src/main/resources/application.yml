spring:
  application:
    name: flowengine
  datasource:
    url: jdbc:oracle:thin:@192.168.2.229:1521:xe
    username: paper
    password: abc123
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    database: ORACLE
    show-sql: true
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.Oracle12cDialect
        format_sql: true
        jdbc:
          batch_size: 20
  redis:
    host: redis-cache
    port: 6379
    password: abc123
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    max-threads: 200
    min-spare-threads: 10

logging:
  level:
    com.fqq.flowengine: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# 自定义业务配置
flowengine:
  context:
    expire-seconds: 1800
  keyid:
    expire-seconds: 1800
  processor:
    http:
      connect-timeout: 5000
      read-timeout: 10000